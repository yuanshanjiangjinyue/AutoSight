<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据报表 - AutoSight 汽配供需选品工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0066FF;
            --success: #00C853;
            --danger: #FF3B30;
            --warning: #FF9500;
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #21262D;
            --text-primary: #FFFFFF;
            --text-secondary: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --gradient-blue: linear-gradient(135deg, #0066FF 0%, #00D4FF 100%);
            --gradient-green: linear-gradient(135deg, #00C853 0%, #00E676 100%);
            --gradient-red: linear-gradient(135deg, #FF3B30 0%, #FF6B6B 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .app-container { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

        .navbar {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky; top: 0; z-index: 1000;
        }

        .navbar-content { display: flex; justify-content: space-between; align-items: center; }

        .logo { display: flex; align-items: center; gap: 12px; }

        .logo-icon {
            width: 40px; height: 40px;
            background: var(--gradient-blue);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .logo-text { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
        .logo-text span { color: var(--primary); }

        .nav-links { display: flex; gap: 8px; }

        .nav-link {
            padding: 8px 16px; border-radius: 8px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500;
            transition: all 0.2s ease; cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary); background: var(--bg-card-hover);
        }

        .nav-link.active { background: var(--primary); color: white; }

        .user-section { display: flex; align-items: center; gap: 16px; }

        .user-info { display: flex; align-items: center; gap: 12px; }

        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--gradient-blue);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px;
        }

        .user-name { font-size: 14px; font-weight: 500; }

        .btn-logout {
            padding: 8px 16px; background: transparent;
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-secondary); font-size: 14px;
            cursor: pointer; transition: all 0.2s ease;
        }

        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        .page-header {
            padding: 40px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 36px; font-weight: 700;
            margin-bottom: 12px;
            background: var(--gradient-blue);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .page-subtitle {
            font-size: 18px; color: var(--text-secondary);
            line-height: 1.6;
        }

        .report-section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 24px; font-weight: 700;
            margin-bottom: 24px;
            display: flex; align-items: center; gap: 12px;
        }

        .section-icon { font-size: 28px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 16px;
        }

        .stat-label {
            font-size: 14px; color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }

        .stat-badge.positive { background: rgba(0, 200, 83, 0.2); color: var(--success); }
        .stat-badge.negative { background: rgba(255, 59, 48, 0.2); color: var(--danger); }
        .stat-badge.neutral { background: rgba(0, 102, 255, 0.2); color: var(--primary); }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 36px; font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-value.positive { color: var(--success); }
        .stat-value.negative { color: var(--danger); }
        .stat-value.neutral { color: var(--primary); }

        .stat-description {
            font-size: 13px; color: var(--text-muted);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 24px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .chart-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .chart-title {
            font-size: 18px; font-weight: 600;
        }

        .chart-body { padding: 24px; }

        .chart-container { height: 350px; }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left; padding: 12px 16px;
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        .data-table tr:hover td {
            background: var(--bg-card-hover);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px; font-weight: 600;
        }

        .category-badge.new-energy { background: rgba(0, 212, 255, 0.2); color: #00D4FF; }
        .category-badge.custom { background: rgba(255, 149, 0, 0.2); color: var(--warning); }
        .category-badge.pet { background: rgba(255, 59, 48, 0.2); color: var(--danger); }
        .category-badge.electronics { background: rgba(102, 51, 153, 0.2); color: #9966CC; }
        .category-badge.general { background: rgba(139, 148, 158, 0.2); color: var(--text-secondary); }

        .metric-value {
            font-family: 'Space Mono', monospace;
            font-weight: 600;
        }

        .metric-value.positive { color: var(--success); }
        .metric-value.negative { color: var(--danger); }

        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
        }

        .loading-spinner {
            width: 60px; height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { margin-top: 20px; font-size: 16px; color: var(--text-secondary); }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-muted);
        }

        @media (max-width: 1200px) {
            .charts-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .stats-grid { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>

    <nav class="navbar">
        <div class="app-container navbar-content">
            <div class="logo">
                <div class="logo-icon">🔭</div>
                <div class="logo-text">Auto<span>Sight</span></div>
            </div>

            <div class="nav-links">
                <a href="/dashboard" class="nav-link">供需看板</a>
                <a href="/blue-ocean" class="nav-link">蓝海选品</a>
                <a href="/reports" class="nav-link active">数据报表</a>
                <a href="/profile" class="nav-link">用户中心</a>
            </div>

            <div class="user-section">
                <div class="user-info" onclick="window.location.href='/profile'" style="cursor: pointer;">
                    <div class="user-avatar" id="userAvatar">王</div>
                    <span class="user-name" id="userName">汽配卖家</span>
                </div>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>
    </nav>

    <main class="app-container">
        <div class="page-header">
            <h1 class="page-title">📊 数据报表中心</h1>
            <p class="page-subtitle">
                全面的市场分析和趋势洞察，助您做出更明智的选品决策
            </p>
        </div>

        <div class="report-section">
            <h2 class="section-title">
                <span class="section-icon">📈</span>
                市场概览
            </h2>
            <div class="stats-grid" id="marketStats"></div>
        </div>

        <div class="report-section">
            <h2 class="section-title">
                <span class="section-icon">🏆</span>
                TOP 5 蓝海品类
            </h2>
            <div class="chart-card">
                <div class="chart-body" style="padding: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>品类名称</th>
                                <th>类型</th>
                                <th>供需缺口</th>
                                <th>需求增速</th>
                                <th>CR5指数</th>
                            </tr>
                        </thead>
                        <tbody id="topProductsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="report-section">
            <h2 class="section-title">
                <span class="section-icon">📊</span>
                市场分析图表
            </h2>
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3 class="chart-title">各品类类型供需对比</h3>
                    </div>
                    <div class="chart-body">
                        <div class="chart-container">
                            <canvas id="typeChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h3 class="chart-title">供需缺口分布</h3>
                    </div>
                    <div class="chart-body">
                        <div class="chart-container">
                            <canvas id="gapChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="report-section">
            <h2 class="section-title">
                <span class="section-icon">📉</span>
                趋势分析
            </h2>
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">整体供需趋势</h3>
                </div>
                <div class="chart-body">
                    <div class="chart-container" style="height: 400px;">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="report-section">
            <h2 class="section-title">
                <span class="section-icon">🔍</span>
                品类类型分析
            </h2>
            <div class="charts-grid" id="typeAnalysisCharts"></div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let typeChart = null;
        let gapChart = null;
        let trendChart = null;

        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('user');

            if (!token || !user) {
                window.location.href = '/';
                return false;
            }

            const userData = JSON.parse(user);
            document.getElementById('userName').textContent = userData.username;
            document.getElementById('userAvatar').textContent = userData.username.charAt(0).toUpperCase();
            return true;
        }

        function getAuthHeaders() {
            return {
                'Authorization': 'Bearer ' + localStorage.getItem('auth_token'),
                'Content-Type': 'application/json'
            };
        }

        async function loadReports() {
            try {
                const [marketRes, trendsRes] = await Promise.all([
                    fetch(`${API_BASE}/reports/market`, { headers: getAuthHeaders() }),
                    fetch(`${API_BASE}/reports/trends`, { headers: getAuthHeaders() })
                ]);

                if (!marketRes.ok || !trendsRes.ok) throw new Error('获取数据失败');

                const marketData = await marketRes.json();
                const trendsData = await trendsRes.json();

                renderMarketStats(marketData);
                renderTopProducts(marketData.top5);
                renderTypeChart(marketData.by_type);
                renderGapChart(marketData.by_status);
                renderTrendChart(trendsData.overall);
                renderTypeAnalysisCharts(trendsData.by_type);

            } catch (error) {
                console.error('加载错误:', error);
                alert('加载报表失败，请刷新重试');
            }
        }

        function renderMarketStats(data) {
            const container = document.getElementById('marketStats');
            const totalBlue = data.by_status.find(s => s.status === 'blue' || s.status === 'top-blue');
            const topBlue = data.top5[0];

            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">蓝海品类总数</span>
                        <span class="stat-badge positive">高增长</span>
                    </div>
                    <div class="stat-value positive">${totalBlue ? totalBlue.count : 0}</div>
                    <div class="stat-description">供需缺口大于0的优质赛道</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">平均供需缺口</span>
                        <span class="stat-badge positive">优质</span>
                    </div>
                    <div class="stat-value positive">${totalBlue ? totalBlue.avg_gap.toFixed(1) : 0}%</div>
                    <div class="stat-description">蓝海品类平均供需差值</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">TOP1 品类</span>
                        <span class="stat-badge neutral">推荐</span>
                    </div>
                    <div class="stat-value neutral">${topBlue ? topBlue.name.substring(0, 8) : 'N/A'}</div>
                    <div class="stat-description">供需缺口 ${topBlue ? topBlue.gap : 0}%</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">市场热度</span>
                        <span class="stat-badge positive">活跃</span>
                    </div>
                    <div class="stat-value positive">${data.by_type.length}</div>
                    <div class="stat-description">个品类类型值得关注</div>
                </div>
            `;
        }

        function renderTopProducts(products) {
            const tbody = document.getElementById('topProductsTable');
            const tags = {
                'new-energy': '新能源',
                'custom': '定制件',
                'pet': '宠物',
                'electronics': '电子',
                'general': '通用'
            };

            tbody.innerHTML = products.map((p, i) => `
                <tr>
                    <td><strong>${i + 1}</strong></td>
                    <td><strong>${p.name}</strong></td>
                    <td><span class="category-badge ${p.category_type}">${tags[p.category_type] || '配件'}</span></td>
                    <td><span class="metric-value positive">+${p.gap}%</span></td>
                    <td><span class="metric-value positive">+${p.demand_growth}%</span></td>
                    <td><span class="metric-value ${p.cr5 < 30 ? 'positive' : ''}">${p.cr5}%</span></td>
                </tr>
            `).join('');
        }

        function renderTypeChart(data) {
            const ctx = document.getElementById('typeChart').getContext('2d');
            const tags = {
                'new-energy': '新能源',
                'custom': '定制件',
                'pet': '宠物',
                'electronics': '电子',
                'general': '通用'
            };

            if (typeChart) typeChart.destroy();

            typeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => tags[d.category_type] || d.category_type),
                    datasets: [
                        {
                            label: '平均供需缺口',
                            data: data.map(d => d.avg_gap),
                            backgroundColor: 'rgba(0, 200, 83, 0.8)',
                            borderColor: '#00C853',
                            borderWidth: 1
                        },
                        {
                            label: '平均需求增速',
                            data: data.map(d => d.avg_demand),
                            backgroundColor: 'rgba(0, 102, 255, 0.8)',
                            borderColor: '#0066FF',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { color: '#8B949E' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#30363D' },
                            ticks: { color: '#6E7681' }
                        },
                        y: {
                            grid: { color: '#30363D' },
                            ticks: {
                                color: '#6E7681',
                                callback: v => v + '%'
                            }
                        }
                    }
                }
            });
        }

        function renderGapChart(data) {
            const ctx = document.getElementById('gapChart').getContext('2d');

            if (gapChart) gapChart.destroy();

            const blueData = data.find(d => d.status === 'top-blue' || d.status === 'blue');
            const redData = data.find(d => d.status === 'red');

            gapChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['蓝海品类', '红海品类'],
                    datasets: [{
                        data: [blueData ? blueData.count : 0, redData ? redData.count : 0],
                        backgroundColor: [
                            'rgba(0, 200, 83, 0.8)',
                            'rgba(255, 59, 48, 0.8)'
                        ],
                        borderColor: ['#00C853', '#FF3B30'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#8B949E' }
                        }
                    }
                }
            });
        }

        function renderTrendChart(data) {
            const ctx = document.getElementById('trendChart').getContext('2d');

            const gradientGreen = ctx.createLinearGradient(0, 0, 0, 400);
            gradientGreen.addColorStop(0, 'rgba(0, 200, 83, 0.3)');
            gradientGreen.addColorStop(1, 'rgba(0, 200, 83, 0)');

            const gradientRed = ctx.createLinearGradient(0, 0, 0, 400);
            gradientRed.addColorStop(0, 'rgba(255, 59, 48, 0.2)');
            gradientRed.addColorStop(1, 'rgba(255, 59, 48, 0)');

            if (trendChart) trendChart.destroy();

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.month),
                    datasets: [
                        {
                            label: '平均需求增速',
                            data: data.map(d => d.avg_demand),
                            borderColor: '#00C853',
                            backgroundColor: gradientGreen,
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '平均供给增速',
                            data: data.map(d => d.avg_supply),
                            borderColor: '#FF3B30',
                            backgroundColor: gradientRed,
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { color: '#8B949E' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#30363D' },
                            ticks: { color: '#6E7681' }
                        },
                        y: {
                            grid: { color: '#30363D' },
                            ticks: {
                                color: '#6E7681',
                                callback: v => v + '%'
                            }
                        }
                    }
                }
            });
        }

        function renderTypeAnalysisCharts(data) {
            const container = document.getElementById('typeAnalysisCharts');
            const tags = {
                'new-energy': '新能源',
                'custom': '定制件',
                'pet': '宠物',
                'electronics': '电子',
                'general': '通用'
            };

            let html = '';
            for (const [type, trendData] of Object.entries(data)) {
                html += `
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3 class="chart-title">${tags[type] || type} 趋势</h3>
                        </div>
                        <div class="chart-body">
                            <div class="chart-container">
                                <canvas id="chart-${type}"></canvas>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;

            setTimeout(() => {
                for (const [type, trendData] of Object.entries(data)) {
                    const ctx = document.getElementById(`chart-${type}`).getContext('2d');

                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: trendData.map(d => d.month),
                            datasets: [
                                {
                                    label: '需求',
                                    data: trendData.map(d => d.avg_demand),
                                    borderColor: '#00C853',
                                    backgroundColor: 'rgba(0, 200, 83, 0.1)',
                                    borderWidth: 2,
                                    tension: 0.4,
                                    fill: true
                                },
                                {
                                    label: '供给',
                                    data: trendData.map(d => d.avg_supply),
                                    borderColor: '#FF3B30',
                                    backgroundColor: 'rgba(255, 59, 48, 0.1)',
                                    borderWidth: 2,
                                    tension: 0.4,
                                    fill: true
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'top',
                                    labels: { color: '#8B949E', fontSize: 11 }
                                }
                            },
                            scales: {
                                x: {
                                    grid: { color: '#30363D' },
                                    ticks: { color: '#6E7681', fontSize: 10 }
                                },
                                y: {
                                    grid: { color: '#30363D' },
                                    ticks: {
                                        color: '#6E7681',
                                        fontSize: 10,
                                        callback: v => v + '%'
                                    }
                                }
                            }
                        }
                    });
                }
            }, 100);
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
            } catch (error) {
                console.error('登出错误:', error);
            } finally {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user');
                window.location.href = '/';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) return;
            loadReports();
            document.getElementById('loadingOverlay').style.display = 'none';
        });
    </script>
</body>
</html>
