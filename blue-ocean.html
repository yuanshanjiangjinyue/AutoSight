<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝海选品 - AutoSight 汽配供需选品工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0066FF;
            --success: #00C853;
            --danger: #FF3B30;
            --warning: #FF9500;
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #21262D;
            --text-primary: #FFFFFF;
            --text-secondary: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --gradient-blue: linear-gradient(135deg, #0066FF 0%, #00D4FF 100%);
            --gradient-green: linear-gradient(135deg, #00C853 0%, #00E676 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .app-container { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

        .navbar {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky; top: 0; z-index: 1000;
        }

        .navbar-content {
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { display: flex; align-items: center; gap: 12px; }

        .logo-icon {
            width: 40px; height: 40px;
            background: var(--gradient-blue);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 20px; font-weight: 700;
        }

        .logo-text span { color: var(--primary); }

        .nav-links { display: flex; gap: 8px; }

        .nav-link {
            padding: 8px 16px; border-radius: 8px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500;
            transition: all 0.2s ease; cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary); background: var(--bg-card-hover);
        }

        .nav-link.active { background: var(--primary); color: white; }

        .user-section { display: flex; align-items: center; gap: 16px; }

        .user-info { display: flex; align-items: center; gap: 12px; }

        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--gradient-blue);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px;
        }

        .user-name { font-size: 14px; font-weight: 500; }

        .btn-logout {
            padding: 8px 16px; background: transparent;
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-secondary); font-size: 14px;
            cursor: pointer; transition: all 0.2s ease;
        }

        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        .page-header {
            padding: 40px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 36px; font-weight: 700;
            margin-bottom: 12px;
            background: var(--gradient-green);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .page-subtitle {
            font-size: 18px; color: var(--text-secondary);
            line-height: 1.6;
        }

        .filters-bar {
            display: flex; gap: 16px; margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex; align-items: center; gap: 8px;
        }

        .filter-label {
            font-size: 14px; color: var(--text-secondary);
            font-weight: 500;
        }

        .filter-select {
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 150px;
        }

        .filter-select:hover, .filter-select:focus {
            border-color: var(--primary); outline: none;
        }

        .results-info {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }

        .results-count {
            font-size: 15px; color: var(--text-secondary);
        }

        .results-count strong {
            color: var(--success); font-family: 'Space Mono', monospace;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: var(--success);
            box-shadow: 0 8px 24px rgba(0, 200, 83, 0.15);
        }

        .product-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 16px;
        }

        .product-name {
            font-size: 18px; font-weight: 600;
            flex: 1; margin-right: 12px;
        }

        .product-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px; font-weight: 600;
        }

        .product-badge.top { background: rgba(0, 102, 255, 0.2); color: var(--primary); }
        .product-badge.blue { background: rgba(0, 200, 83, 0.2); color: var(--success); }
        .product-badge.new-energy { background: rgba(0, 212, 255, 0.2); color: #00D4FF; }
        .product-badge.custom { background: rgba(255, 149, 0, 0.2); color: var(--warning); }
        .product-badge.pet { background: rgba(255, 59, 48, 0.2); color: var(--danger); }
        .product-badge.electronics { background: rgba(102, 51, 153, 0.2); color: #9966CC; }
        .product-badge.general { background: rgba(139, 148, 158, 0.2); color: var(--text-secondary); }

        .product-metrics {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 16px; margin-bottom: 20px;
        }

        .metric {
            background: var(--bg-dark);
            border-radius: 10px; padding: 16px;
        }

        .metric-label {
            font-size: 12px; color: var(--text-muted);
            margin-bottom: 6px;
        }

        .metric-value {
            font-family: 'Space Mono', monospace;
            font-size: 20px; font-weight: 700;
        }

        .metric-value.positive { color: var(--success); }
        .metric-value.negative { color: var(--danger); }
        .metric-value.neutral { color: var(--text-primary); }

        .product-footer {
            display: flex; justify-content: space-between;
            align-items: center; padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .product-status {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .btn-view {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--success);
            border-radius: 6px;
            color: var(--success);
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
        }

        .btn-view:hover {
            background: var(--success); color: white;
        }

        .empty-state {
            text-align: center; padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        .empty-title { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
        .empty-text { font-size: 16px; color: var(--text-secondary); }

        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
        }

        .loading-spinner {
            width: 60px; height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 20px; font-size: 16px; color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .products-grid { grid-template-columns: 1fr; }
            .filters-bar { flex-direction: column; }
            .filter-group { width: 100%; }
            .filter-select { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>

    <nav class="navbar">
        <div class="app-container navbar-content">
            <div class="logo">
                <div class="logo-icon">🔭</div>
                <div class="logo-text">Auto<span>Sight</span></div>
            </div>

            <div class="nav-links">
                <a href="/dashboard" class="nav-link">供需看板</a>
                <a href="/blue-ocean" class="nav-link active">蓝海选品</a>
                <a href="/reports" class="nav-link">数据报表</a>
                <a href="/profile" class="nav-link">用户中心</a>
            </div>

            <div class="user-section">
                <div class="user-info" onclick="window.location.href='/profile'" style="cursor: pointer;">
                    <div class="user-avatar" id="userAvatar">王</div>
                    <span class="user-name" id="userName">汽配卖家</span>
                </div>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>
    </nav>

    <main class="app-container">
        <div class="page-header">
            <h1 class="page-title">🚀 蓝海选品库</h1>
            <p class="page-subtitle">
                基于供需缺口模型，自动筛选高增长、低供给、低竞争的优质赛道
            </p>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <span class="filter-label">品类类型：</span>
                <select class="filter-select" id="typeFilter" onchange="loadBlueOcean()">
                    <option value="all">全部类型</option>
                    <option value="new-energy">新能源配件</option>
                    <option value="custom">定制配饰</option>
                    <option value="pet">宠物车载</option>
                    <option value="electronics">电子配件</option>
                    <option value="general">通用配件</option>
                </select>
            </div>

            <div class="filter-group">
                <span class="filter-label">排序方式：</span>
                <select class="filter-select" id="sortFilter" onchange="loadBlueOcean()">
                    <option value="gap-desc">供需缺口 (高→低)</option>
                    <option value="demand-desc">需求增速 (高→低)</option>
                    <option value="supply-asc">供给增速 (低→高)</option>
                    <option value="cr5-asc">CR5指数 (低→高)</option>
                </select>
            </div>
        </div>

        <div class="results-info">
            <div class="results-count">
                共找到 <strong id="totalCount">0</strong> 个蓝海品类
            </div>
        </div>

        <div class="products-grid" id="productsGrid">
            <div class="empty-state">
                <div class="empty-icon">📦</div>
                <div class="empty-title">加载中...</div>
                <div class="empty-text">正在获取蓝海选品数据</div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';

        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('user');

            if (!token || !user) {
                window.location.href = '/';
                return false;
            }

            const userData = JSON.parse(user);
            document.getElementById('userName').textContent = userData.username;
            document.getElementById('userAvatar').textContent = userData.username.charAt(0).toUpperCase();
            return true;
        }

        function getAuthHeaders() {
            return {
                'Authorization': 'Bearer ' + localStorage.getItem('auth_token'),
                'Content-Type': 'application/json'
            };
        }

        function loadBlueOcean() {
            const type = document.getElementById('typeFilter').value;
            const sortValue = document.getElementById('sortFilter').value;
            const [sort, order] = sortValue.split('-');

            const params = new URLSearchParams();
            params.append('sort', sort);
            params.append('order', order);
            if (type !== 'all') params.append('type', type);

            fetch(`${API_BASE}/blue-ocean?${params}`, {
                headers: getAuthHeaders()
            })
            .then(res => {
                if (!res.ok) throw new Error('获取数据失败');
                return res.json();
            })
            .then(data => {
                document.getElementById('totalCount').textContent = data.length;
                renderProducts(data);
            })
            .catch(error => {
                console.error('加载错误:', error);
                document.getElementById('productsGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <div class="empty-title">加载失败</div>
                        <div class="empty-text">请刷新页面重试</div>
                    </div>
                `;
            });
        }

        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');

            if (products.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">没有找到匹配的品类</div>
                        <div class="empty-text">尝试调整筛选条件</div>
                    </div>
                `;
                return;
            }

            const tags = {
                'new-energy': '新能源',
                'custom': '定制件',
                'pet': '宠物',
                'electronics': '电子',
                'general': '通用'
            };

            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="viewDetail(${p.id})">
                    <div class="product-header">
                        <div class="product-name">${p.name}</div>
                        <div>
                            <span class="product-badge ${p.category_type}">${tags[p.category_type] || '配件'}</span>
                            ${p.status === 'top-blue' ? '<span class="product-badge top" style="margin-left:8px;">顶级</span>' : ''}
                        </div>
                    </div>

                    <div class="product-metrics">
                        <div class="metric">
                            <div class="metric-label">供需缺口</div>
                            <div class="metric-value positive">+${p.gap}%</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">需求增速</div>
                            <div class="metric-value positive">+${p.demand_growth}%</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">供给增速</div>
                            <div class="metric-value neutral">+${p.supply_growth}%</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">CR5指数</div>
                            <div class="metric-value ${p.cr5 < 30 ? 'positive' : 'neutral'}">${p.cr5}%</div>
                        </div>
                    </div>

                    <div class="product-footer">
                        <div class="product-status">
                            <div class="status-dot"></div>
                            <span>${p.status === 'top-blue' ? '顶级蓝海' : '蓝海'}</span>
                        </div>
                        <button class="btn-view">查看详情 →</button>
                    </div>
                </div>
            `).join('');
        }

        function viewDetail(categoryId) {
            window.location.href = `/category/${categoryId}`;
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
            } catch (error) {
                console.error('登出错误:', error);
            } finally {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user');
                window.location.href = '/';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) return;
            loadBlueOcean();
            document.getElementById('loadingOverlay').style.display = 'none';
        });
    </script>
</body>
</html>
