<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品类详情 - AutoSight 汽配供需选品工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0066FF;
            --success: #00C853;
            --danger: #FF3B30;
            --warning: #FF9500;
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #21262D;
            --text-primary: #FFFFFF;
            --text-secondary: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --gradient-blue: linear-gradient(135deg, #0066FF 0%, #00D4FF 100%);
            --gradient-green: linear-gradient(135deg, #00C853 0%, #00E676 100%);
            --gradient-red: linear-gradient(135deg, #FF3B30 0%, #FF6B6B 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .app-container { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

        .navbar {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky; top: 0; z-index: 1000;
        }

        .navbar-content { display: flex; justify-content: space-between; align-items: center; }

        .logo { display: flex; align-items: center; gap: 12px; }

        .logo-icon {
            width: 40px; height: 40px;
            background: var(--gradient-blue);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .logo-text { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
        .logo-text span { color: var(--primary); }

        .nav-links { display: flex; gap: 8px; }

        .nav-link {
            padding: 8px 16px; border-radius: 8px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500;
            transition: all 0.2s ease; cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary); background: var(--bg-card-hover);
        }

        .nav-link.active { background: var(--primary); color: white; }

        .user-section { display: flex; align-items: center; gap: 16px; }

        .user-info { display: flex; align-items: center; gap: 12px; }

        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--gradient-blue);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px;
        }

        .user-name { font-size: 14px; font-weight: 500; }

        .btn-logout {
            padding: 8px 16px; background: transparent;
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-secondary); font-size: 14px;
            cursor: pointer; transition: all 0.2s ease;
        }

        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        .btn-back {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: transparent;
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-secondary); font-size: 14px;
            cursor: pointer; transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-back:hover { border-color: var(--primary); color: var(--primary); }

        .category-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
        }

        .category-title-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 24px;
        }

        .category-title { font-size: 36px; font-weight: 700; margin-bottom: 12px; }

        .category-badges { display: flex; gap: 12px; }

        .category-badge {
            padding: 8px 16px; border-radius: 8px;
            font-size: 14px; font-weight: 600;
        }

        .category-badge.top { background: rgba(0, 102, 255, 0.2); color: var(--primary); }
        .category-badge.blue { background: rgba(0, 200, 83, 0.2); color: var(--success); }
        .category-badge.new-energy { background: rgba(0, 212, 255, 0.2); color: #00D4FF; }
        .category-badge.custom { background: rgba(255, 149, 0, 0.2); color: var(--warning); }

        .metrics-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
        }

        .metric-card {
            background: var(--bg-dark);
            border-radius: 12px; padding: 24px;
        }

        .metric-label {
            font-size: 13px; color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .metric-value {
            font-family: 'Space Mono', monospace;
            font-size: 32px; font-weight: 700;
        }

        .metric-value.positive { color: var(--success); }
        .metric-value.negative { color: var(--danger); }
        .metric-value.neutral { color: var(--text-primary); }

        .content-grid {
            display: grid; grid-template-columns: 2fr 1fr; gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 18px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }

        .card-body { padding: 24px; }

        .chart-container { height: 350px; }

        .analysis-list {
            list-style: none;
        }

        .analysis-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .analysis-item:last-child { border-bottom: none; }

        .analysis-icon {
            font-size: 24px; margin-bottom: 8px;
        }

        .analysis-title {
            font-size: 15px; font-weight: 600;
            margin-bottom: 4px;
        }

        .analysis-text {
            font-size: 14px; color: var(--text-secondary);
            line-height: 1.6;
        }

        .recommendation-card {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .recommendation-card:hover {
            border-color: var(--success);
            transform: translateX(4px);
        }

        .recommendation-title {
            font-size: 15px; font-weight: 600;
            margin-bottom: 8px;
        }

        .recommendation-stats {
            display: flex; gap: 16px;
        }

        .recommendation-stat {
            font-size: 13px; color: var(--text-secondary);
        }

        .recommendation-stat strong {
            color: var(--success);
            font-family: 'Space Mono', monospace;
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
        }

        .loading-spinner {
            width: 60px; height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { margin-top: 20px; font-size: 16px; color: var(--text-secondary); }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-muted);
        }

        @media (max-width: 1200px) {
            .content-grid { grid-template-columns: 1fr; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .metrics-grid { grid-template-columns: 1fr; }
            .category-title-row { flex-direction: column; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>

    <nav class="navbar">
        <div class="app-container navbar-content">
            <div class="logo">
                <div class="logo-icon">🔭</div>
                <div class="logo-text">Auto<span>Sight</span></div>
            </div>

            <div class="nav-links">
                <a href="/dashboard" class="nav-link">供需看板</a>
                <a href="/blue-ocean" class="nav-link">蓝海选品</a>
                <a href="/reports" class="nav-link">数据报表</a>
                <a href="/profile" class="nav-link">用户中心</a>
            </div>

            <div class="user-section">
                <div class="user-info" onclick="window.location.href='/profile'" style="cursor: pointer;">
                    <div class="user-avatar" id="userAvatar">王</div>
                    <span class="user-name" id="userName">汽配卖家</span>
                </div>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>
    </nav>

    <main class="app-container" style="padding-top: 40px;">
        <button class="btn-back" onclick="goBack()">
            ← 返回蓝海选品
        </button>

        <div class="category-header">
            <div class="category-title-row">
                <div>
                    <h1 class="category-title" id="categoryName">加载中...</h1>
                    <div class="category-badges" id="categoryBadges"></div>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">供需缺口</div>
                    <div class="metric-value positive" id="metricGap">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">需求增速</div>
                    <div class="metric-value positive" id="metricDemand">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">供给增速</div>
                    <div class="metric-value neutral" id="metricSupply">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">CR5指数</div>
                    <div class="metric-value neutral" id="metricCR5">--</div>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <span>📈</span>
                        供需趋势分析
                    </h2>
                </div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <span>💡</span>
                        分析建议
                    </h2>
                </div>
                <div class="card-body">
                    <ul class="analysis-list" id="analysisList">
                        <li class="analysis-item">
                            <div class="analysis-icon">🎯</div>
                            <div class="analysis-title">供需缺口分析</div>
                            <div class="analysis-text" id="gapAnalysis">分析中...</div>
                        </li>
                        <li class="analysis-item">
                            <div class="analysis-icon">📊</div>
                            <div class="analysis-title">竞争程度评估</div>
                            <div class="analysis-text" id="competitionAnalysis">分析中...</div>
                        </li>
                        <li class="analysis-item">
                            <div class="analysis-icon">⏰</div>
                            <div class="analysis-title">入场时机建议</div>
                            <div class="analysis-text" id="timingAnalysis">分析中...</div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <span>🚀</span>
                    相似蓝海推荐
                </h2>
            </div>
            <div class="card-body" id="similarProducts">
                <div class="empty-state">加载中...</div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let categoryId = null;
        let chart = null;

        function getCategoryIdFromUrl() {
            const path = window.location.pathname;
            const match = path.match(/\/category\/(\d+)/);
            return match ? parseInt(match[1]) : null;
        }

        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('user');

            if (!token || !user) {
                window.location.href = '/';
                return false;
            }

            const userData = JSON.parse(user);
            document.getElementById('userName').textContent = userData.username;
            document.getElementById('userAvatar').textContent = userData.username.charAt(0).toUpperCase();
            return true;
        }

        function getAuthHeaders() {
            return {
                'Authorization': 'Bearer ' + localStorage.getItem('auth_token'),
                'Content-Type': 'application/json'
            };
        }

        function loadCategoryDetail() {
            categoryId = getCategoryIdFromUrl();

            if (!categoryId) {
                alert('无效的品类ID');
                window.location.href = '/blue-ocean';
                return;
            }

            fetch(`${API_BASE}/categories/${categoryId}/analysis`, {
                headers: getAuthHeaders()
            })
            .then(res => {
                if (!res.ok) throw new Error('获取数据失败');
                return res.json();
            })
            .then(data => {
                renderCategoryDetail(data);
            })
            .catch(error => {
                console.error('加载错误:', error);
                alert('加载失败，请重试');
                window.location.href = '/blue-ocean';
            });
        }

        function renderCategoryDetail(data) {
            const { category, trend, similar } = data;

            document.getElementById('categoryName').textContent = category.name;

            const tags = {
                'new-energy': '新能源',
                'custom': '定制件',
                'pet': '宠物',
                'electronics': '电子',
                'general': '通用'
            };

            const badges = [
                `<span class="category-badge ${category.category_type}">${tags[category.category_type] || '配件'}</span>`,
                `<span class="category-badge ${category.status}">${category.status === 'top-blue' ? '顶级蓝海' : '蓝海'}</span>`
            ];
            document.getElementById('categoryBadges').innerHTML = badges.join('');

            document.getElementById('metricGap').textContent = `+${category.gap}%`;
            document.getElementById('metricDemand').textContent = `+${category.demand_growth}%`;
            document.getElementById('metricSupply').textContent = `+${category.supply_growth}%`;
            document.getElementById('metricCR5').textContent = `${category.cr5}%`;

            renderTrendChart(trend);
            renderAnalysis(category);
            renderSimilarProducts(similar);
        }

        function renderTrendChart(trend) {
            const ctx = document.getElementById('trendChart').getContext('2d');

            const gradientGreen = ctx.createLinearGradient(0, 0, 0, 350);
            gradientGreen.addColorStop(0, 'rgba(0, 200, 83, 0.3)');
            gradientGreen.addColorStop(1, 'rgba(0, 200, 83, 0)');

            const gradientRed = ctx.createLinearGradient(0, 0, 0, 350);
            gradientRed.addColorStop(0, 'rgba(255, 59, 48, 0.2)');
            gradientRed.addColorStop(1, 'rgba(255, 59, 48, 0)');

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: trend.map(t => t.month),
                    datasets: [
                        {
                            label: '需求增速',
                            data: trend.map(t => t.demand_value),
                            borderColor: '#00C853',
                            backgroundColor: gradientGreen,
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '供给增速',
                            data: trend.map(t => t.supply_value),
                            borderColor: '#FF3B30',
                            backgroundColor: gradientRed,
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: '#8B949E',
                                font: { family: "'Noto Sans SC', sans-serif" }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#30363D' },
                            ticks: { color: '#6E7681' }
                        },
                        y: {
                            grid: { color: '#30363D' },
                            ticks: {
                                color: '#6E7681',
                                callback: value => value + '%'
                            }
                        }
                    }
                }
            });
        }

        function renderAnalysis(category) {
            let gapAnalysis = '';
            if (category.gap > 50) {
                gapAnalysis = `供需缺口高达${category.gap}%，市场需求远大于供给，是非常优质的蓝海赛道。建议尽快入场抢占市场份额。`;
            } else if (category.gap > 30) {
                gapAnalysis = `供需缺口${category.gap}%，市场增长潜力良好。需求增长${category.demand_growth}%，供给增长仅${category.supply_growth}%，仍有入场空间。`;
            } else {
                gapAnalysis = `供需缺口${category.gap}%，市场处于温和增长状态。建议持续关注需求变化趋势。`;
            }
            document.getElementById('gapAnalysis').textContent = gapAnalysis;

            let competitionAnalysis = '';
            if (category.cr5 < 25) {
                competitionAnalysis = `CR5指数${category.cr5}%，市场集中度低，竞争格局分散。没有形成垄断的头部卖家，新进入者机会大。`;
            } else if (category.cr5 < 40) {
                competitionAnalysis = `CR5指数${category.cr5}%，市场集中度适中，存在一定头部效应，但仍有竞争空间。`;
            } else {
                competitionAnalysis = `CR5指数${category.cr5}%，市场集中度较高，头部卖家占据较大份额。建议寻找差异化竞争点。`;
            }
            document.getElementById('competitionAnalysis').textContent = competitionAnalysis;

            let timingAnalysis = '';
            if (category.demand_growth > 80) {
                timingAnalysis = `需求增速${category.demand_growth}%，处于爆发期！是入场的最佳时机，建议立即行动。`;
            } else if (category.demand_growth > 50) {
                timingAnalysis = `需求增速${category.demand_growth}%，市场快速增长中。建议在未来1-2个月内入场。`;
            } else {
                timingAnalysis = `需求增速${category.demand_growth}%，市场稳步增长。可以有充足时间做选品和准备。`;
            }
            document.getElementById('timingAnalysis').textContent = timingAnalysis;
        }

        function renderSimilarProducts(similar) {
            const container = document.getElementById('similarProducts');

            if (similar.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无相似推荐</div>';
                return;
            }

            container.innerHTML = similar.map(p => `
                <div class="recommendation-card" onclick="viewCategory(${p.id})">
                    <div class="recommendation-title">${p.name}</div>
                    <div class="recommendation-stats">
                        <div class="recommendation-stat">缺口: <strong>+${p.gap}%</strong></div>
                        <div class="recommendation-stat">需求: <strong>+${p.demand_growth}%</strong></div>
                        <div class="recommendation-stat">CR5: <strong>${p.cr5}%</strong></div>
                    </div>
                </div>
            `).join('');
        }

        function viewCategory(id) {
            window.location.href = `/category/${id}`;
        }

        function goBack() {
            window.location.href = '/blue-ocean';
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
            } catch (error) {
                console.error('登出错误:', error);
            } finally {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user');
                window.location.href = '/';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) return;
            loadCategoryDetail();
            document.getElementById('loadingOverlay').style.display = 'none';
        });
    </script>
</body>
</html>
